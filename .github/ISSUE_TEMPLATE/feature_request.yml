name: Feature request
description: Describe a real Cocos debugging problem and the desired outcome
title: "[Idea] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Explain the debugging problem before proposing a feature. Do not post proprietary project material or personal contact information.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened the last time you faced this problem, and how long did diagnosis take?
    validations:
      required: true
  - type: textarea
    id: workaround
    attributes:
      label: Current workaround
      description: What do you use today instead?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired evidence or outcome
      description: What evidence would make the result trustworthy?
    validations:
      required: true
  - type: textarea
    id: unsafe-actions
    attributes:
      label: Actions the tool must never take
      description: Describe any safety boundary that matters for this use case.
